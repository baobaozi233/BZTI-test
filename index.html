<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>正财人格测试 MVP</title>
<style>
body{font-family:sans-serif;background:#f6faf6;margin:0;padding:0;}
.screen{display:none;max-width:600px;margin:auto;padding:20px;}
.screen.active{display:block;}
.question{background:#fff;border-radius:12px;padding:16px;margin-bottom:16px;}
.options label{display:block;margin:8px 0;cursor:pointer;}
button{padding:10px 16px;margin-top:10px;cursor:pointer;}
img{max-width:100%;border-radius:12px;margin-top:16px;}
</style>
</head>
<body>

<!-- 首页：性别选择 -->
<section id="intro" class="screen active">
<h1>正财人格测试</h1>
<label>选择性别:
  <select id="genderSelect">
    <option value="male">男</option>
    <option value="female">女</option>
  </select>
</label>
<br>
<button id="startBtn">开始测试</button>
</section>

<!-- 测试页 -->
<section id="test" class="screen">
<div id="questionList"></div>
<div>
<button id="submitBtn" disabled>提交查看结果</button>
</div>
</section>

<!-- 结果页 -->
<section id="result" class="screen">
<h2 id="resultTypeName"></h2>
<p id="resultDesc"></p>
<img id="resultImage" alt="正财人格">
<br>
<button id="restartBtn">重新测试</button>
</section>

<script>
let userGender = 'male';
const app = {answers:{}};

// 10道题
const questions = [
{id:'q1', text:'关于赚钱的根本想法', options:[{label:'A. 更相信持续劳动和慢慢积累',value:1},{label:'B. 更相信抓住机会和用对方法放大',value:2}]},
{id:'q2', text:'做项目或任务时注意力放哪', options:[{label:'A. 先盯着能操作的细节、具体步骤和近期结果',value:1},{label:'B. 先盯着整体想法、大方向和长远打算',value:2}]},
{id:'q3', text:'平时花钱的原则', options:[{label:'A. 花得值，看重实用和长期能用',value:1},{label:'B. 当下开心、多花点也行',value:2}]},
{id:'q4', text:'对“上班拿固定工资”这种活法', options:[{label:'A. 能接受，觉得稳定，付出和回报对等',value:1},{label:'B. 心里不太愿意，更想自己掌控',value:2}]},
{id:'q5', text:'选长期伴侣时主要看', options:[{label:'A. 对方能不能一起稳定过日子、担责任',value:1},{label:'B. 两人感情上、精神上合拍、吸引',value:2}]},
{id:'q6', text:'对钱的投资风险', options:[{label:'A. 尽量避开风险，本金安全第一',value:1},{label:'B. 愿意冒些风险，换更高回报可能',value:2}]},
{id:'q7', text:'对已经有的东西', options:[{label:'A. 能用就接着用',value:1},{label:'B. 会定期换新的，保持新鲜和简洁',value:2}]},
{id:'q8', text:'在工作里主要贡献什么', options:[{label:'A. 把一个清晰方案高标准做出来',value:1},{label:'B. 在模糊方向上想出能走的路',value:2}]},
{id:'q9', text:'时间花在哪', options:[{label:'A. 花在能直接看到成果的具体事情',value:1},{label:'B. 花在搞关系、找资源',value:2}]},
{id:'q10', text:'整体更像', options:[{label:'A. 务实、谨慎、有耐力、关注落地细节',value:1},{label:'B. 想法多、乐观、有视野、关注大方向',value:2}]}
];

// 正财人格
const TYPE_LIBRARY = {
  ZHENGCAI: {
    code:'ZHENGCAI',
    cn:'正财',
    desc:'不相信天上掉馅饼，只相信汗水换黄金。安全感，是存款给的。',
    images:{male:'./image/zhengcai-male.png', female:'./image/zhengcai-female.png'}
  }
};

const screens = {intro:document.getElementById('intro'), test:document.getElementById('test'), result:document.getElementById('result')};
const questionList = document.getElementById('questionList');
const submitBtn = document.getElementById('submitBtn');
const resultImage = document.getElementById('resultImage');

function showScreen(name){Object.entries(screens).forEach(([k,el])=>el.classList.toggle('active',k===name));}

function renderQuestions(){
  questionList.innerHTML='';
  questions.forEach((q,i)=>{
    const card=document.createElement('div');
    card.className='question';
    card.innerHTML=`<div><b>第 ${i+1} 题</b> ${q.text}</div>
      <div class="options">${q.options.map(opt=>`<label><input type="radio" name="${q.id}" value="${opt.value}"> ${opt.label}</label>`).join('')}</div>`;
    questionList.appendChild(card);
  });

  questionList.querySelectorAll('input[type="radio"]').forEach(input=>{
    input.addEventListener('change',e=>{
      app.answers[e.target.name]=Number(e.target.value);
      submitBtn.disabled=!questions.every(q=>app.answers[q.id]!==undefined);
    });
  });
}

function computeResult(){
  // MVP 固定输出正财人格
  return TYPE_LIBRARY.ZHENGCAI;
}

document.getElementById('startBtn').addEventListener('click',()=>{
  userGender = document.getElementById('genderSelect').value;
  app.answers={};
  renderQuestions();
  showScreen('test');
});

submitBtn.addEventListener('click',()=>{
  const type = computeResult();
  document.getElementById('resultTypeName').textContent=`${type.code}（${type.cn}）`;
  document.getElementById('resultDesc').textContent=type.desc;
  resultImage.src = type.images[userGender];
  resultImage.alt = `${type.cn} ${userGender}`;
  showScreen('result');
});

document.getElementById('restartBtn').addEventListener('click',()=>showScreen('intro'));
</script>
</body>
</html>
